<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homestay — Guest Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      background: #f5f5f5;
      color: #333;
    }

    .page-wrapper {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 16px 40px;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #1a1a1a;
    }

    .section {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .section h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #222;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #555;
    }

    .field input[type="text"],
    .field input[type="date"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input[type="text"]:focus,
    .field input[type="date"]:focus {
      border-color: #4a90e2;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 4px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      color: #333;
      font-weight: 400;
      cursor: pointer;
    }

    .radio-group input[type="radio"] {
      cursor: pointer;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .btn-secondary {
      background: #6c757d;
      color: #fff;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .result {
      margin-top: 16px;
      font-size: 15px;
    }

    .result-text-success { color: #1a7f37; font-weight: 500; }
    .result-text-error   { color: #c0392b; font-weight: 500; }

    .result-card {
      padding: 14px 16px;
      border-radius: 6px;
      margin-top: 4px;
      font-size: 15px;
      line-height: 1.7;
    }

    .result-card.confirmed    { background: #d4edda; color: #155724; }
    .result-card.pending_host { background: #fff3cd; color: #856404; }
    .result-card.failed       { background: #f8d7da; color: #721c24; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 4px;
      font-size: 14px;
    }

    th, td {
      text-align: left;
      padding: 9px 12px;
      border: 1px solid #e0e0e0;
    }

    th {
      background: #f7f7f7;
      font-weight: 600;
      color: #444;
      width: 40%;
    }

    td { color: #333; }
  </style>
</head>
<body>

<div class="page-wrapper">
  <h1>🏡 Guest Portal</h1>

  <!-- SECTION 1: Book a Property -->
  <div class="section">
    <h2>Book a Property</h2>

    <div class="field">
      <label for="listingId">Listing ID</label>
      <input id="listingId" type="text" placeholder="e.g. 3f2e1a...">
    </div>

    <div class="field">
      <label for="guestId">Guest ID</label>
      <input id="guestId" type="text" placeholder="e.g. 7c4b0d...">
    </div>

    <div class="field">
      <label for="checkIn">Check-in Date</label>
      <input id="checkIn" type="date">
    </div>

    <div class="field">
      <label for="checkOut">Check-out Date</label>
      <input id="checkOut" type="date">
    </div>

    <div class="field">
      <label for="paymentMethod">Payment Method</label>
      <input id="paymentMethod" type="text" value="pm_card_visa">
    </div>

    <div class="field">
      <label>Booking Mode</label>
      <div class="radio-group">
        <label><input type="radio" name="mode" value="INSTANT" checked> Instant</label>
        <label><input type="radio" name="mode" value="REQUEST"> Request</label>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-secondary" onclick="checkAvailability()">Check Availability</button>
      <button class="btn-primary" onclick="initiateBooking()">Reserve Now</button>
    </div>

    <div id="availabilityResult" class="result"></div>
    <div id="bookingResult" class="result"></div>
  </div>

  <!-- SECTION 2: Check Booking Status -->
  <div class="section">
    <h2>Check Booking Status</h2>

    <div class="field">
      <label for="lookupId">Booking ID</label>
      <input id="lookupId" type="text" placeholder="Paste booking ID here">
    </div>

    <div class="btn-row">
      <button class="btn-secondary" onclick="lookupBooking()">Lookup</button>
    </div>

    <div id="lookupResult" class="result"></div>
  </div>
</div>

<script>
  const API_BASE = "http://localhost:8000";

  async function checkAvailability() {
    const listingId = document.getElementById("listingId").value.trim();
    const checkIn   = document.getElementById("checkIn").value;
    const checkOut  = document.getElementById("checkOut").value;
    const el = document.getElementById("availabilityResult");

    el.innerHTML = "<span style='color:#888'>Checking...</span>";

    try {
      const url = `${API_BASE}/availability?listingId=${encodeURIComponent(listingId)}`
                + `&checkInDate=${encodeURIComponent(checkIn)}`
                + `&checkOutDate=${encodeURIComponent(checkOut)}`;
      const res = await fetch(url);
      const json = await res.json();

      if (res.ok && json.data && json.data.available === true) {
        el.innerHTML = '<span class="result-text-success">✓ Available</span>';
      } else if (res.ok && json.data && json.data.available === false) {
        el.innerHTML = '<span class="result-text-error">✗ Not Available</span>';
      } else {
        el.innerHTML = '<span class="result-text-error">Error checking availability</span>';
      }
    } catch (err) {
      el.innerHTML = `<span class="result-text-error">Error checking availability: ${err.message}</span>`;
    }
  }

  async function initiateBooking() {
    const listingId      = document.getElementById("listingId").value.trim();
    const guestId        = document.getElementById("guestId").value.trim();
    const checkInDate    = document.getElementById("checkIn").value;
    const checkOutDate   = document.getElementById("checkOut").value;
    const paymentMethodId = document.getElementById("paymentMethod").value.trim();
    const bookingMode    = document.querySelector('input[name="mode"]:checked').value;
    const el = document.getElementById("bookingResult");

    el.innerHTML = "<span style='color:#888'>Processing...</span>";

    try {
      const res = await fetch(`${API_BASE}/bookings/initiate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          listingId, guestId, checkInDate, checkOutDate,
          paymentMethodId, bookingMode
        })
      });
      const json = await res.json();
      const data = json.data || {};
      const status = (data.status || "").toUpperCase();

      let cardClass = "failed";
      if (status === "CONFIRMED")    cardClass = "confirmed";
      if (status === "PENDING_HOST") cardClass = "pending_host";

      if (data.bookingId) {
        window.lastBookingId = data.bookingId;
        document.getElementById("lookupId").value = data.bookingId;
      }

      el.innerHTML = `
        <div class="result-card ${cardClass}">
          <strong>Booking ID:</strong> ${data.bookingId || "—"}<br>
          <strong>Status:</strong> ${data.status || json.message || "—"}
        </div>`;
    } catch (err) {
      el.innerHTML = `<span class="result-text-error">Error creating booking: ${err.message}</span>`;
    }
  }

  async function lookupBooking() {
    const bookingId = document.getElementById("lookupId").value.trim();
    const el = document.getElementById("lookupResult");

    el.innerHTML = "<span style='color:#888'>Looking up...</span>";

    try {
      const res = await fetch(`${API_BASE}/bookings/${encodeURIComponent(bookingId)}`);
      const json = await res.json();

      if (!res.ok || !json.data) {
        el.innerHTML = `<span class="result-text-error">${json.message || "Booking not found"}</span>`;
        return;
      }

      const d = json.data;
      const fields = [
        ["bookingId",     d.bookingId],
        ["guestId",       d.guestId],
        ["hostId",        d.hostId],
        ["listingId",     d.listingId],
        ["checkInDate",   d.checkInDate],
        ["checkOutDate",  d.checkOutDate],
        ["bookingMode",   d.bookingMode],
        ["status",        d.status],
        ["paymentDueAt",  d.paymentDueAt || "—"],
      ];

      const rows = fields.map(([k, v]) =>
        `<tr><th>${k}</th><td>${v != null ? v : "—"}</td></tr>`
      ).join("");

      el.innerHTML = `
        <table>
          <thead><tr><th>Field</th><th>Value</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    } catch (err) {
      el.innerHTML = `<span class="result-text-error">Error looking up booking: ${err.message}</span>`;
    }
  }
</script>

</body>
</html>
